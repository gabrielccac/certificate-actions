name: Run Python Script

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Script to run'
        required: true
        type: choice
        options:
          - capture-trf1
          - capture-receita
          - capture-fazenda
      payload:
        description: 'JSON payload (required for script-fazenda)'
        required: false
        default: ''
      callback_url:
        description: 'Callback URL to POST the result to'
        required: false
        default: ''

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: '.github/workflows/main.yml'

      - name: Install dependencies
        run: uv pip install --system seleniumbase curl-cffi requests

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Trigger script
        env:
          RAW_PAYLOAD: ${{ github.event.inputs.payload }}
          RAW_CALLBACK: ${{ github.event.inputs.callback_url }}
        run: |
          xvfb-run python ${{ github.event.inputs.script }}.py
